<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMT Automall Links</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-top: #f4f8fc;
      --bg-bottom: #ffffff;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-strong: #ffffff;
      --border: rgba(33, 56, 82, 0.12);
      --text: #18324f;
      --muted: #6c7d90;
      --brand: #284d75;
      --brand-soft: #edf4fb;
      --shadow: 0 20px 55px rgba(25, 53, 84, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 48%, #f8fbfe 100%);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px 36px;
      position: relative;
      overflow: hidden;
    }

    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(24, 50, 79, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(24, 50, 79, 0.05) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.85), transparent 92%);
      pointer-events: none;
    }

    .page::after {
      content: '';
      position: absolute;
      width: 320px;
      height: 320px;
      top: -80px;
      right: -100px;
      background: radial-gradient(circle, rgba(65, 129, 197, 0.16), transparent 68%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 430px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 26px 20px 24px;
      border-radius: 30px;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.85);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 1;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    @keyframes floatSoft {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-5px);
      }
    }

    @keyframes dotBlink {
      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.35;
      }
    }

    .logo-card {
      width: 100%;
      padding: 18px;
      border-radius: 24px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(239, 246, 253, 0.96));
      border: 1px solid var(--border);
      box-shadow: 0 16px 32px rgba(25, 53, 84, 0.08);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s ease both, floatSoft 3.2s 1s ease-in-out infinite;
      margin-bottom: 18px;
    }

    .logo-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 15%, rgba(65, 129, 197, 0.08), transparent 80%);
      background-size: 200% 100%;
      opacity: 0.95;
      animation: shimmer 5.5s linear infinite;
    }

    .logo-image {
      width: 100%;
      max-width: 290px;
      height: auto;
      display: block;
      position: relative;
      z-index: 1;
    }

    .brand-name {
      font-size: 29px;
      font-weight: 700;
      letter-spacing: -0.7px;
      color: var(--text);
      animation: fadeUp 0.6s 0.1s ease both;
      opacity: 0;
      margin: 0;
      text-align: center;
    }

    .brand-tag {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1.8px;
      color: var(--brand);
      text-transform: uppercase;
      margin: 6px 0 28px;
      animation: fadeUp 0.6s 0.15s ease both;
      opacity: 0;
      text-align: center;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(40, 77, 117, 0.25), transparent);
      margin-bottom: 24px;
      animation: fadeUp 0.6s 0.18s ease both;
      opacity: 0;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border-radius: 18px;
      background: var(--panel-strong);
      border: 1px solid var(--border);
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      opacity: 0;
      box-shadow: 0 12px 24px rgba(25, 53, 84, 0.06);
      transition: border-color 0.22s ease, transform 0.18s ease, box-shadow 0.22s ease;
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(65, 129, 197, 0.08) 50%, transparent 100%);
      background-size: 200% 100%;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .link-card:hover {
      border-color: rgba(40, 77, 117, 0.28);
      transform: translateY(-3px);
      box-shadow: 0 18px 32px rgba(25, 53, 84, 0.10);
    }

    .link-card:hover::before {
      opacity: 1;
      animation: shimmer 1.1s linear;
    }

    .link-card:active {
      transform: scale(0.985);
    }

    .icon-badge {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
    }

    .ig-bg {
      background: #fff3f8;
      border: 1px solid #f4bfd3;
    }

    .fb-bg {
      background: #eff5ff;
      border: 1px solid #c9d9ff;
    }

    .yt-bg {
      background: #fff3f3;
      border: 1px solid #f6c7c7;
    }

    .google-bg {
      background: #fff9ed;
      border: 1px solid #f4d58e;
    }

    .link-text {
      flex: 1;
    }

    .link-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      display: block;
    }

    .link-handle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      display: block;
    }

    .arrow-icon {
      opacity: 0.35;
      flex-shrink: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .link-card:hover .arrow-icon {
      opacity: 0.7;
      transform: translateX(3px);
    }

    .sep-label {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin: 24px 0 16px;
      animation: fadeUp 0.6s 0.53s ease both;
      opacity: 0;
    }

    .contact-btn {
      width: 100%;
      padding: 18px 20px;
      border-radius: 18px;
      border: 1px solid rgba(40, 77, 117, 0.18);
      background: linear-gradient(135deg, #ffffff 0%, #edf4fb 100%);
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      cursor: pointer;
      animation: fadeUp 0.6s 0.6s ease both;
      opacity: 0;
      transition: transform 0.18s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 14px 28px rgba(25, 53, 84, 0.08);
    }

    .contact-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(40, 77, 117, 0.32);
      box-shadow: 0 18px 34px rgba(25, 53, 84, 0.11);
    }

    .contact-btn:active {
      transform: scale(0.985);
    }

    .contact-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(40, 77, 117, 0.10);
      border: 1px solid rgba(40, 77, 117, 0.14);
      flex-shrink: 0;
    }

    .contact-copy {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .contact-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--brand);
      letter-spacing: 0.2px;
    }

    .contact-number {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    .contact-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(40, 77, 117, 0.12);
      color: var(--brand);
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      animation: dotBlink 1.8s ease-in-out infinite;
    }

    .footer {
      margin-top: 26px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1.3px;
      animation: fadeUp 0.6s 0.68s ease both;
      opacity: 0;
      text-align: center;
    }

    @media (max-width: 480px) {
      .container {
        padding: 22px 16px 22px;
        border-radius: 24px;
      }

      .brand-name {
        font-size: 25px;
      }

      .brand-tag {
        letter-spacing: 1.4px;
      }

      .contact-btn {
        align-items: flex-start;
      }

      .contact-pill {
        margin-top: 2px;
      }
    }
  </style>
</head>
